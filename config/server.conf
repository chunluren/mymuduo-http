# mymuduo-http 配置文件

[server]
# 监听端口
port = 8080
# IO 线程数
threads = 4
# 最大连接数
max_connections = 10000
# 连接超时 (秒)
timeout = 60

[http]
# Keep-Alive 超时 (秒)
keepalive_timeout = 60
# 请求体最大大小 (字节)
max_body_size = 10485760
# 静态文件目录
static_dir = ./static

[rpc]
# RPC 端口
port = 8081
# 调用超时 (毫秒)
call_timeout = 5000

[log]
# 日志级别: DEBUG, INFO, WARN, ERROR, FATAL
level = INFO
# 日志文件
file = /var/log/mymuduo-http.log
# 异步缓冲区大小
buffer_size = 1000

[pool]
# 连接池最小连接数
min_connections = 5
# 连接池最大连接数
max_connections = 20